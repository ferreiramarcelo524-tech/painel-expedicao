<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PAINEL CD-84</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #000; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 160px; border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding: 10px; gap: 20px; background: #050505; }
        .main { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #00428a; font-size: 10px; padding: 8px 2px; position: sticky; top: 0; text-transform: uppercase; }
        td { border-bottom: 1px solid #222; padding: 6px 2px; text-align: center; font-size: 13px; font-weight: bold; }
        tr:nth-child(even) { background: #0a0a0a; }
        .col-placa { color: #3498db; font-size: 15px; }
        .col-doca { color: #f1c40f; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="font-size: 12px; color: #666;">CD-84</h2>
        <div id="chart_div"></div>
        <div id="fat_txt" style="color: #2ecc71; font-size: 18px; font-weight: bold;">R$ 0,00</div>
    </div>
    <div class="main">
        <table>
            <thead>
                <tr>
                    <th>TIPO</th><th>FIL</th><th>DOCA</th><th>VALOR</th><th>VEIC</th><th>DATA</th><th>VEZ</th><th>PLACA</th><th>CUB</th>
                </tr>
            </thead>
            <tbody id="tabelaBody"></tbody>
        </table>
    </div>

    <script>
        // COLE O LINK DA NOVA IMPLANTAÇÃO ABAIXO
        const LINK_API = "COLE_AQUI_O_LINK_QUE_TERMINA_EM_EXEC";

        google.charts.load('current', {'packages':['gauge']});
        google.charts.setOnLoadCallback(() => {
            const chart = new google.visualization.Gauge(document.getElementById('chart_div'));
            const data = google.visualization.arrayToDataTable([['Label', 'Value'],['%', 0]]);
            const options = { width: 140, height: 140, redFrom: 0, redTo: 50, yellowFrom: 50, yellowTo: 85, greenFrom: 85, greenTo: 100 };

            async function carregar() {
                try {
                    const res = await fetch(LINK_API);
                    const json = await res.json();
                    
                    // Faturamento e Gráfico
                    document.getElementById('fat_txt').innerText = json.faturamento;
                    let num = parseFloat(json.faturamento.replace(/[R$.]/g, '').replace(',', '.')) || 0;
                    let perc = Math.round((num / json.meta) * 100);
                    data.setValue(0, 1, perc > 100 ? 100 : perc);
                    chart.draw(data, options);

                    // Tabela
                    const body = document.getElementById('tabelaBody');
                    body.innerHTML = "";
                    json.veiculos.forEach(v => {
                        const row = body.insertRow();
                        let cor = v.tipo.includes("ABASTECIMENTO") ? "#f39c12" : v.tipo.includes("ELETRO") ? "#2ecc71" : "#dc3545";
                        if(!v.tipo) cor = "#fff";
                        row.innerHTML = `<td style="color:${cor}">${v.tipo}</td><td>${v.filial}</td><td class="col-doca">${v.doca}</td><td>${v.valor}</td><td>${v.veiculos}</td><td style="color:#666; font-size:11px">${v.data}</td><td>${v.vez}</td><td class="col-placa">${v.placa}</td><td>${v.cubagem}</td>`;
                    });
                } catch (e) { console.error("Erro:", e); }
            }

            carregar();
            setInterval(carregar, 15000);
        });
    </script>
</body>
</html>
