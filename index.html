<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD-84 - MÁXIMO ESPAÇO</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #000; color: white; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 160px; background-color: #0a0a0a; border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding: 10px 5px; gap: 10px; }
        .sidebar h2 { font-size: 0.7rem; color: #666; text-align: center; text-transform: uppercase; }
        #val_faturamento { color: #2ecc71; font-weight: bold; font-size: 1.1rem; text-align: center; }
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 0; }
        .table-container { flex: 1; background-color: #000; overflow-y: auto; }
        table { border-collapse: collapse; width: 100%; }
        th { background-color: #00428a; color: white; padding: 5px 2px; font-size: 0.6rem; text-transform: uppercase; position: sticky; top: 0; z-index: 10; }
        td { padding: 4px 2px; border-bottom: 1px solid #1a1a1a; text-align: center; font-size: 0.85rem; font-weight: bold; white-space: nowrap; }
        tr:nth-child(even) { background-color: #080808; }
        .col-doca { color: #f1c40f; }
        .col-placa { color: #3498db; font-size: 1rem; border-left: 1px solid #222; }
        .col-valor { color: #2ecc71; font-size: 0.75rem; }
        .table-container::-webkit-scrollbar { width: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>CD-84 EXP</h2>
        <div id="chart_div"></div>
        <div id="val_faturamento">R$ 0,00</div>
    </div>
    <div class="main-content">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>TIPO</th><th>FIL</th><th>DOCA</th><th>VALOR</th><th>VEIC</th><th>DATA</th><th>VEZ</th><th>PLACA</th><th>CUB</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>
    <script type="text/javascript">
        const URL_API = "COLE_O_LINK_DA_SUA_IMPLANTACAO_AQUI"; 
        google.charts.load('current', {'packages':['gauge']});
        google.charts.setOnLoadCallback(inicializar);
        var chart, dataChart, options;
        function inicializar() {
            dataChart = google.visualization.arrayToDataTable([['Label', 'Value'],['%', 0]]);
            options = { width: 140, height: 140, redFrom: 0, redTo: 50, yellowFrom: 50, yellowTo: 85, greenFrom: 85, greenTo: 100, minorTicks: 5 };
            chart = new google.visualization.Gauge(document.getElementById('chart_div'));
            chart.draw(dataChart, options);
            atualizar();
            setInterval(atualizar, 10000);
        }
        async function atualizar() {
            try {
                const response = await fetch(URL_API, { redirect: 'follow' });
                const json = await response.json();
                document.getElementById('val_faturamento').innerText = json.faturamento;
                let fatNum = parseFloat(json.faturamento.replace(/[R$\s.]/g, '').replace(',', '.')) || 0;
                let perc = (fatNum / (json.meta || 1)) * 100;
                dataChart.setValue(0, 1, Math.round(perc));
                chart.draw(dataChart, options);
                const tbody = document.getElementById('corpoTabela');
                tbody.innerHTML = '';
                json.veiculos.forEach(v => {
                    const row = tbody.insertRow();
                    let corTipo = "#fff";
                    if(v.tipo.includes("ABASTECIMENTO")) corTipo = "#f39c12";
                    else if(v.tipo.includes("ELETRO")) corTipo = "#2ecc71";
                    else if(v.tipo !== "") corTipo = "#dc3545";
                    row.innerHTML = `<td style="color:${corTipo}">${v.tipo}</td><td>${v.filial}</td><td class="col-doca">${v.doca}</td><td class="col-valor">${v.valor}</td><td>${v.veiculos}</td><td style="color:#666; font-size:0.7rem">${v.data}</td><td>${v.vez}</td><td class="col-placa">${v.placa}</td><td>${v.cubagem}</td>`;
                });
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
